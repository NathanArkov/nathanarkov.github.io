# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "en"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:
  # Automatically fetch Github repo star count
  - GithubRepoStarsCountPlugin:
      - ZhgChgLi/ZMarkupParser
      - ZhgChgLi/ZReviewTender
      - ZhgChgLi/ZMediumToMarkdown
      - ZhgChgLi/linkyee

# Google Analytics tracking id
google_analytics_id:

# HTML Title
title: "Nathan BRG - Links"

# Avatar image path
avatar: "./images/profile.jpeg"

# Name section text
name: "Nathan BRG"

# Tagline section text
tagline: >-
    🇫🇷 Cybersecurity expert and IT enthusiast, looking for new opportunities

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-brands fa-linkedin"
      text: "LinkedIn"
      url: "https://www.linkedin.com/in/nathan-brg/"
      alt: "Nathan BRG on Linkedin"
      title: "Nathan BRG on Linkedin"
      target: "_blank"
  - link:
      icon: "fa-solid fa-briefcase"
      text: "Portfolio"
      url: "./pdfs/Nathan_BRANGE_Portfolio.pdf"
      alt: "My Portfolio"
      title: "My Portfolio"
      target: "_blank"
  - link:
      icon: "fa-solid fa-resume"
      text: "Resume"
      url: "./pdfs/Nathan_BRANGE_Resume.pdf"
      alt: "My resume (English)"
      title: "My resume (English)"
      target: "_blank"
  - link:
      icon: "fa-solid fa-envelope"
      text: "Email"
      url: "mailto:nathan.brg@proton.me"
      alt: "Contact me via email"
      title: "Contact me via email"
      target: "_blank"


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:
  - social:
      icon: "fa-brands fa-github"
      url: "https://github.com/NathanArkov"
      title: "My (empty) GitHub"
      alt: "My (empty) GitHub"
      target: "_blank"
  - social:
      icon: "fa-brands fa-linkedin"
      url: "https://www.linkedin.com/in/nathan-brg/"
      alt: "Nathan BRG on Linkedin"
      title: "Nathan BRG on Linkedin"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:nathan.brg@proton.me"
      title: "Email: nathan.brg@proton.me"
      alt: "nathan.brg@proton.me"
      target: "_blank"

# Footer text
footer: >
    Hi there! Don't hesitate to reach out if you want to connect, collaborate on a project, or just say hi.

# Footer copyright message
# Linkyee is a 100% free, open-source project—feel free to modify the copyright message as you like. :)
copyright: >
  © 2026  <a href="https://nathanarkov.github.io" target="_blank">Nathan BRG</a>. Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
